name: Package

on:
  push:
    branches: ["*"]
    tags: ["v*"]

permissions:
  contents: write

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Determine version
        id: version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION="0.0.0-${GITHUB_SHA::7}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Version: ${VERSION}"

      - name: Build Python zipapp
        run: |
          mkdir -p _zipapp_staging
          cp -r arch_bootstrap _zipapp_staging/arch_bootstrap
          find _zipapp_staging -type d -name __pycache__ -exec rm -rf {} +
          printf 'from arch_bootstrap.__main__ import main\nmain()\n' \
            > _zipapp_staging/__main__.py
          python3 -m zipapp _zipapp_staging \
            -o arch_bootstrap.pyz \
            -p "/usr/bin/env python3"
          rm -rf _zipapp_staging

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: arch-bootstrap-${{ steps.version.outputs.version }}
          path: |
            arch_bootstrap.pyz
            arch_bootstrap.py

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v') && contains(github.ref_name, '.')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            arch_bootstrap.pyz
            arch_bootstrap.py
          generate_release_notes: true
